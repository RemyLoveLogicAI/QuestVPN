# QuestVPN Ansible Inventory - DEMO Configuration
# Replace IP addresses with your actual Hetzner Cloud servers

[vpn_west]
questvpn-west ansible_host=157.230.10.50 ansible_user=root region=west

[vpn_east]
questvpn-east ansible_host=157.230.20.100 ansible_user=root region=east

[vpn_servers:children]
vpn_west
vpn_east

[vpn_servers:vars]
# SSH configuration
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=accept-new'

# Connection settings
ansible_connection=ssh
ansible_ssh_timeout=30
ansible_ssh_retries=3
